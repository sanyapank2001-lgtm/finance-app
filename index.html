ay:block;font-size:17px;font-weight:450}.insight{border-left:3px solid var(--gold);padding:11px 13px;background:#f3eadb;font-size:11px}.goal-hero{background:var(--navy);color:white}.goal-hero .progress{height:8px;background:#31414f}.goal-hero .progress i{background:var(--gold)}.goal-numbers{display:flex;justify-content:space-between;margin-top:13px;font-size:11px}.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.scenario{border:1px solid var(--line);border-radius:8px;padding:11px;text-align:center}.scenario strong{display:block;margin-top:5px}.scenario.active{border-color:var(--gold);background:#f4ead8}.report{line-height:1.7;font-size:12px}.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);gap:12px}.setting-row input{width:115px;text-align:right;border:1px solid var(--line);border-radius:7px;padding:9px}.toast{position:fixed;z-index:100;left:50%;bottom:95px;transform:translate(-50%,20px);background:var(--navy);color:white;padding:11px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:.2s;font-size:12px}.toast.show{opacity:1;transform:translate(-50%,0)}.empty{text-align:center;padding:35px;color:var(--muted)}

/* PWA and iPhone safe-area support */
html{background:#eef2f6}
body{min-height:100dvh;overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
.app-shell{min-height:100dvh}
.topbar{height:auto;min-height:104px;padding-top:calc(20px + env(safe-area-inset-top));-webkit-backdrop-filter:blur(20px)}
.bottom-nav{-webkit-backdrop-filter:blur(22px)}

/* Prevent native iOS controls and long financial labels from widening the page */
main,.screen,.stack,.card,.form-card,.field,.section-head,.category-card,.category-head,.category-values,.list-item,.list-item>div{min-width:0;max-width:100%}
.field input,.field select,.field textarea{min-width:0;max-width:100%;-webkit-appearance:none;appearance:none}
.field select{background-image:linear-gradient(45deg,transparent 50%,var(--ink) 50%),linear-gradient(135deg,var(--ink) 50%,transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 12px) 50%;background-size:4px 4px,4px 4px;background-repeat:no-repeat;padding-right:34px}
.field input[type="date"]{-webkit-appearance:none;appearance:none;position:relative;padding-right:42px}
.field input[type="date"]::-webkit-calendar-picker-indicator{position:absolute;right:12px;width:18px;height:18px;margin:0;padding:0;opacity:.82}
.section-head{gap:8px;flex-wrap:wrap}
.section-head p{max-width:52%;text-align:right;overflow-wrap:anywhere}
.category-head{align-items:flex-start;flex-wrap:wrap}
.category-head>div{min-width:0;flex:1 1 130px}
.category-head .status{flex:0 1 auto;max-width:100%;white-space:normal;text-align:center}
.category-values{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.category-values strong{font-size:15px;overflow-wrap:anywhere}
.list-item{grid-template-columns:38px minmax(0,1fr) auto}
.list-item small,.list-item strong{overflow-wrap:anywhere}
.list-item select{min-width:0;max-width:112px}
.plan-overview{grid-template-columns:repeat(3,minmax(0,1fr))}
.plan-overview strong{overflow-wrap:anywhere}
.scenario-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
.scenario{min-width:0;max-width:100%;overflow-wrap:anywhere}

@media(max-width:390px){
  .section-head h1{font-size:26px}
  .section-head p{font-size:10px}
  .card{padding:16px}
  .category-values{gap:5px;font-size:9px}
  .category-values strong{font-size:13px}
  .plan-overview strong{font-size:19px;letter-spacing:-.4px}
  .plan-overview>div{padding-right:6px}
  .plan-overview>div+div{padding-left:7px}
  .list-item{grid-template-columns:34px minmax(0,1fr) auto;gap:8px;padding:11px}
  .list-icon{width:34px;height:34px}
  .amount{font-size:12px;white-space:nowrap}
}

@media(max-width:340px){
  .topbar{gap:8px;padding-left:12px;padding-right:10px}
  .period{padding-left:9px}
  .period strong{font-size:18px}
  .period span{font-size:8px;letter-spacing:2px}
  .top-actions{gap:0}
  .icon-button{width:32px}
  .section-head p{max-width:46%}
  .category-values{grid-template-columns:1fr 1fr}
  .category-values>div:last-child{grid-column:1/-1}
  .list-item{grid-template-columns:32px minmax(0,1fr)}
  .list-item>div:last-child{grid-column:2;text-align:left}
  .list-item select{max-width:100%}
  .scenario-grid{grid-template-columns:1fr}
  .scenario{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;text-align:left}
  .scenario strong{margin-top:0}
}

/* Full responsive audit: systemic overflow, touch and layout safeguards */
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{overflow-x:clip}
img,svg,canvas{display:block;max-width:100%}
main,.app-shell,.screen,.stack,.dashboard-grid,.wide-grid,.mini-grid,.paydays,.forecast,.donut-row,.legend,.legend-item,.plan-overview,.scenario-grid,.button-row,.setting-row{min-width:0;max-width:100%}
h1,h2,h3,p,span,strong,small,label,.label,.card-title,.category-meta,.report,.insight{overflow-wrap:anywhere}
.legend-item{grid-template-columns:10px minmax(0,1fr) auto;align-items:start}
.legend-item b,.amount{white-space:nowrap}
.hero-value{max-width:100%;font-size:clamp(40px,13vw,76px);letter-spacing:clamp(-4px,-.7vw,-2px);overflow-wrap:anywhere}
.forecast-value,.plan-overview strong,.metric .value{max-width:100%;line-height:1.08;overflow-wrap:anywhere}
.sparkline,.chart{min-width:0;max-width:100%;overflow:hidden}
.chart{gap:clamp(2px,1.5vw,7px)}
.bar{min-width:0}
.filter-row{display:flex;flex-wrap:wrap;overflow:visible;padding-bottom:0}
.chip{min-height:44px;padding:10px 13px;white-space:normal;overflow-wrap:anywhere}
.button,.scenario{min-height:44px}
.icon-button{width:44px;height:44px;min-width:44px;display:grid;place-items:center}
.field input,.field select,.field textarea{font-size:16px;min-height:46px}
.list-item select{min-height:44px;padding:8px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
.bottom-nav{height:calc(84px + env(safe-area-inset-bottom));padding-bottom:max(8px,env(safe-area-inset-bottom))}
.screen{padding-bottom:calc(112px + env(safe-area-inset-bottom))}
.nav-item{min-height:56px;overflow:hidden}
.nav-item span{font-size:9px;line-height:1.15;text-align:center}

@media(max-width:430px){
  .screen{padding-left:12px;padding-right:12px}
  .hero{padding:25px 21px;min-height:190px}
  .forecast{grid-template-columns:1fr;gap:8px}
  .forecast .sparkline{height:82px}
  .plan-overview{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 0}
  .plan-overview>div:nth-child(3){grid-column:1/-1;border-left:0;padding-left:0;padding-top:10px;border-top:1px solid var(--line)}
  .category-values{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .category-values>div:last-child{grid-column:1/-1}
  .donut-row{grid-template-columns:1fr;justify-items:center;gap:18px}
  .donut-row .legend{width:100%}
  .donut{width:132px;height:132px}
  .donut:after{inset:29px}
  .list-item{grid-template-columns:36px minmax(0,1fr);gap:9px}
  .list-item>div:last-child{grid-column:2;min-width:0;text-align:left}
  .list-item select{width:100%;max-width:100%;margin-top:7px}
  .amount{white-space:normal;overflow-wrap:anywhere}
  .setting-row{display:grid;grid-template-columns:minmax(0,1fr) 104px;align-items:center}
  .setting-row input{width:100%;min-width:0}
  .button-row{display:grid;grid-template-columns:1fr;width:100%}
  .button-row>.button,.button-row>label{width:100%;text-align:center}
}

@media(max-width:360px){
  .hero-value{font-size:clamp(36px,12vw,44px)}
  .payday{padding:14px 11px;grid-template-columns:30px minmax(0,1fr);gap:7px}
  .calendar-icon{width:30px;height:30px}
  .payday strong{font-size:31px}
  .metric .value{font-size:32px}
  .setting-row{grid-template-columns:1fr}
  .setting-row input{width:100%;text-align:left}
  .nav-item span{font-size:9px}
}

/* Keep tablet portrait and phone landscape in the spacious mobile navigation mode. */
@media(min-width:760px) and (max-width:899px){
  .app-shell{display:block}
  .side-nav{display:none}
  .bottom-nav{display:flex}
  .screen{padding:18px 24px calc(112px + env(safe-area-inset-bottom))}
  .topbar{padding-left:24px}
  .menu-button{display:grid}
  .dashboard-grid,.wide-grid{display:grid;grid-template-columns:1fr}
  .dashboard-grid .hero,.mini-grid{grid-column:auto}
  .form-card{grid-template-columns:1fr}
  .form-card .full{grid-column:auto}
  .donut-row{grid-template-columns:170px minmax(0,1fr)}
}

/* V3 interaction layer */
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.page-actions.search-only{display:block}
.add-button{width:46px;height:46px;border:0;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:#fff;font-size:27px;line-height:1;box-shadow:0 8px 24px rgba(189,129,40,.28)}
.search-box{position:relative;flex:1;min-width:180px}
.search-box input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.72);padding:10px 13px 10px 36px;font-size:16px;color:var(--ink)}
.search-box:before{content:'⌕';position:absolute;left:13px;top:10px;color:var(--muted);font-size:19px}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab-button{border:1px solid var(--line);background:transparent;color:var(--ink);padding:9px 12px;min-height:42px;border-radius:8px;font-size:11px}
.tab-button.active{background:var(--navy);border-color:var(--navy);color:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.summary-card{padding:16px;min-width:0}
.summary-card .value{display:block;margin-top:8px;font-size:clamp(22px,7vw,34px);font-weight:350;line-height:1.05;overflow-wrap:anywhere}
.summary-card .hint{display:block;margin-top:7px;font-size:10px;color:var(--muted);line-height:1.4}
.summary-card.warn{border-color:#d7b478;background:#f7f0e5}
.summary-card.dark{background:var(--navy);color:#fff;border-color:var(--navy)}
.summary-card.dark .hint{color:#c9d1d8}
.action-list{display:grid;gap:8px}
.action-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.action-row:last-child{border-bottom:0}
.action-row p{margin:4px 0 0;font-size:10px;color:var(--muted)}
.tiny-button{border:1px solid var(--line);background:transparent;color:var(--ink);min-height:38px;padding:7px 10px;border-radius:7px;font-size:10px}
.icon-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.icon-actions button{border:1px solid var(--line);background:transparent;min-height:36px;padding:6px 9px;border-radius:6px;font-size:10px;color:var(--ink)}
.modal-backdrop{position:fixed;z-index:80;inset:0;background:rgba(9,17,24,.46);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:grid;align-items:end;padding:12px}
.modal{width:min(100%,640px);max-height:min(88dvh,820px);overflow-y:auto;margin:0 auto;background:#eef2f6;border:1px solid rgba(255,255,255,.55);border-radius:18px 18px 12px 12px;padding:20px;box-shadow:0 28px 80px rgba(6,15,24,.35)}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:17px}
.modal-head h2{font-size:21px;margin:0}
.modal-close{width:44px;height:44px;border:0;border-radius:50%;background:#dde3e8;color:var(--ink);font-size:21px}
.modal .form-card{padding:0;border:0;background:transparent;box-shadow:none}
.modal-open{overflow:hidden}
.goal-card{display:grid;gap:12px}
.goal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.goal-head h3{margin:0;font-size:16px}
.goal-balance{font-size:28px;font-weight:350;line-height:1.1;overflow-wrap:anywhere}
.goal-history{display:grid;gap:6px;font-size:10px;color:var(--muted)}
.year-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.year-cell{border:1px solid var(--line);border-radius:8px;padding:11px;min-width:0}
.year-cell span{font-size:9px;text-transform:uppercase;color:var(--muted)}
.year-cell strong{display:block;margin-top:6px;font-size:15px;overflow-wrap:anywhere}
.sync-state{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.sync-state:before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gold)}
.empty-compact{padding:18px;text-align:center;color:var(--muted);font-size:11px}
.dictionary-block{display:grid;gap:10px;padding:15px 0;border-bottom:1px solid var(--line)}
.dictionary-block:last-child{border-bottom:0}
.dictionary-chips{display:flex;flex-wrap:wrap;gap:7px}
.dictionary-chip{display:inline-flex;align-items:center;gap:3px;min-height:38px;padding:5px 6px 5px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.55);font-size:10px}
.dictionary-chip button{width:28px;height:28px;border:0;border-radius:50%;background:#e3e8ec;color:var(--ink);display:grid;place-items:center}
.search-result{width:100%;text-align:left;color:var(--ink);font:inherit;cursor:pointer}
.search-result span{min-width:0}
.notification-row{display:grid;gap:8px;padding:13px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.55)}
.notification-row strong{font-size:12px;line-height:1.45}

@media(min-width:700px){
  .summary-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .modal-backdrop{align-items:center}
  .modal{border-radius:16px}
  .year-grid{grid-template-columns:repeat(6,minmax(0,1fr))}
}

@media(max-width:430px){
  .page-actions{display:grid;grid-template-columns:minmax(0,1fr) 46px;width:100%}
  .page-actions .search-box{min-width:0}
  .summary-grid{grid-template-columns:1fr 1fr}
  .action-row{grid-template-columns:1fr}
  .action-row>.tiny-button{justify-self:start}
  .goal-head{display:grid}
  .year-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .modal{padding:17px 14px;padding-bottom:calc(18px + env(safe-area-inset-bottom))}
}

/* V3.5 task-first interactions */
.home-widget{cursor:pointer;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;-webkit-tap-highlight-color:transparent}.home-widget:active{transform:scale(.985)}.card.home-widget:hover{border-color:#b8c2cb;box-shadow:0 13px 38px rgba(33,47,61,.08)}
.detail-total{font-size:clamp(38px,12vw,58px);font-weight:300;letter-spacing:-2px;margin:4px 0 20px}.detail-grid,.contribution-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.detail-grid span,.contribution-grid span{display:grid;gap:7px;padding:13px;border:1px solid var(--line);border-radius:9px;font-size:10px;color:var(--muted)}.detail-grid strong,.contribution-grid strong{font-size:18px;font-weight:450;color:var(--ink)}.modal-route{margin-top:14px}.detail-row,.category-link{width:100%;border:0;background:transparent;color:inherit;text-align:left;font:inherit}.detail-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px 4px;border-bottom:1px solid var(--line)}.detail-row strong{color:var(--gold);font-size:11px}.problem-detail{display:grid;gap:18px}.problem-detail .insight p{margin:6px 0 0}.detail-list{display:grid;gap:7px}.detail-list span{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:11px}.category-link{cursor:pointer;border-radius:9px}.category-card.category-link{padding:10px}.category-card.category-link:active{background:#e6ebef}.legend-item.category-link{padding:4px;align-items:center}.analytics-donut{flex:none}
.contribution-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.contribution-grid strong{font-size:14px}.goal-forecast{height:145px;display:flex;align-items:end;gap:7px;padding:28px 0 22px;border-bottom:1px solid var(--line)}.goal-forecast>div{height:100%;flex:1;display:flex;align-items:end;justify-content:center;position:relative}.goal-forecast i{display:block;width:min(26px,70%);min-height:8px;border-radius:5px 5px 0 0;background:linear-gradient(to top,var(--gold),#dfb46e)}.goal-forecast strong{position:absolute;top:-22px;font-size:8px;font-weight:500;white-space:nowrap}.goal-forecast span{position:absolute;bottom:-18px;font-size:8px;color:var(--muted);white-space:nowrap}.summary-card .value.compact{font-size:16px;line-height:1.15;margin-top:9px}
@media(max-width:390px){.contribution-grid,.detail-grid{grid-template-columns:1fr}.goal-forecast{gap:3px}.goal-forecast strong{font-size:7px;transform:rotate(-20deg);top:-17px}}

 s.plans=Array.isArray(s.plans)?s.plans:clone(base.plans||[]);

 if(!Array.isArray(s.goals))s.goals=clone(base.goals||[]);s.goals.forEach(g=>{if(g.type==='buffer')g.type='Подушка'});
 if(!Array.isArray(s.obligations))s.obligations=clone(base.obligations||[]);

 s.dictionaries={...deriveDictionaries(s),...(base.dictionaries||{}),...(s.dictionaries||{})};

function recommendations(){

 if(t.free<0)r.push(`Свободный остаток отрицательный. Можно перенести планы на ${money(Math.abs(t.free))}.`);
 if(!r.length)r.push('План устойчив: обязательства покрыты, критических превышений нет.');
 return r;
}
function actionProblems(){const problems=[],unpaid=state.obligations.filter(x=>!isPaid(x));if(unpaid.length)problems.push({kind:'obligations',title:`Не оплачено: ${unpaid.length}`,reason:`До ближайших сроков нужно зарезервировать ${money(sum(unpaid,x=>x.amount))}.`,items:unpaid.map(x=>`${x.title} · ${money(x.amount)} · до ${x.dueDay} числа`)});overages().forEach(c=>problems.push({kind:'category',category:c.name,title:`Перерасход: ${c.name}`,reason:`Факт и планы превышают лимит на ${money(categoryFact(c.name)+categoryPlan(c.name)-c.amount)}.`,items:categoryOperations(c.name).map(o=>`${niceDate(o.date)} · ${o.subcategory||o.category} · ${money(o.amount)}`)}));const need=Math.max(0,(state.creditCard.plannedPayment||state.creditCard.minPayment)-state.creditCard.paidThisMonth);if(need)problems.push({kind:'credit',title:'Платёж по кредитке',reason:`До ${state.creditCard.dueDay} числа осталось внести ${money(need)}.`,items:[]});if(totals().free<0)problems.push({kind:'budget',title:'Недостаточно свободных средств',reason:`Резервы превышают доступный остаток на ${money(Math.abs(totals().free))}.`,items:state.plans.filter(p=>p.status==='Запланировано').slice(0,5).map(p=>`${p.title} · ${money(p.amount)}`)});if(!problems.length)problems.push({kind:'ok',title:'План под контролем',reason:'Обязательства покрыты, проблемных лимитов нет.',items:[]});return problems}
function openProblemDetail(index){const p=actionProblems()[index];if(!p)return;const actions=p.kind==='category'?`<button class="button gold" id="problemEditCategory">Изменить лимит</button><button class="button secondary" id="problemOperations">Операции категории</button>`:p.kind==='obligations'?`<button class="button gold" id="problemPlan">Открыть обязательства</button>`:p.kind==='credit'?`<button class="button gold" id="problemCredit">Настроить платёж</button>`:p.kind==='budget'?`<button class="button gold" id="problemPlans">Пересмотреть планы</button>`:'';openModal(p.title,`<div class="problem-detail"><div class="insight"><strong>Причина</strong><p>${p.reason}</p></div><div><div class="card-title">Последние операции и объекты</div>${p.items.length?`<div class="detail-list">${p.items.map(x=>`<span>${escapeHtml(x)}</span>`).join('')}</div>`:'<div class="empty-compact">Связанных операций нет</div>'}</div><div class="button-row">${actions}</div></div>`,()=>{const route=id=>{const b=el(id);if(b)b.onclick=()=>{closeModal();active='plan';render()}};route('#problemPlan');route('#problemCredit');route('#problemPlans');const edit=el('#problemEditCategory');if(edit)edit.onclick=()=>openDictionaryModal('categories',p.category,'analytics');const ops=el('#problemOperations');if(ops)ops.onclick=()=>{closeModal();active='entry';opFilters.search=p.category;render()}})}

function repeatedOverages(){const months=[...new Set(state.operations.map(o=>o.date.slice(0,7)))].sort(),out=[];state.categories.filter(c=>c.controlType==='limit').forEach(c=>{let count=0;months.forEach(m=>{const fact=sum(state.operations.filter(o=>o.category===c.name&&o.date.startsWith(m)&&operationKind(o)==='expense'),o=>o.amount);if(fact>c.amount)count++});if(count>=2)out.push({name:c.name,months:count})});return out}

function goalCard(g){const left=Math.max(0,g.target-g.saved),months=Math.ceil(left/Math.max(1,g.monthly)),real=months<=24,forecastDate=addMonths(new Date(),months),deadlineMonths=g.deadline?Math.max(1,Math.ceil((new Date(g.deadline)-new Date())/2629800000)):months,requiredMonthly=Math.ceil(left/deadlineMonths),requiredWeekly=Math.ceil(requiredMonthly/4.345),requiredDaily=Math.ceil(requiredMonthly/30.44),history=state.operations.filter(o=>o.category===g.name&&['savings','withdrawal'].includes(operationKind(o))).slice(-4).reverse(),forecast=Array.from({length:Math.min(6,months||1)},(_,i)=>({date:addMonths(new Date(),i+1),saved:Math.min(g.target,g.saved+g.monthly*(i+1))}));return `<section class="card goal-card"><div class="goal-head"><div><h3>${escapeHtml(g.name)}</h3><span class="status">${escapeHtml(g.type)}</span></div><div class="icon-actions"><button data-edit-goal="${g.id}">Изменить</button><button data-delete-goal="${g.id}">Удалить</button></div></div><div class="goal-balance">${money(g.saved)} <small>из ${money(g.target)}</small></div>${progress(g.saved,g.target)}<div class="summary-grid"><div class="summary-card"><span class="eyebrow">Осталось</span><strong class="value">${money(left)}</strong></div><div class="summary-card ${real?'':'warn'}"><span class="eyebrow">Дата достижения</span><strong class="value compact">${forecastDate.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</strong><span class="hint">При взносе ${money(g.monthly)} / мес.</span></div></div><div class="contribution-grid"><span>В месяц<strong>${money(requiredMonthly)}</strong></span><span>В неделю<strong>${money(requiredWeekly)}</strong></span><span>В день<strong>${money(requiredDaily)}</strong></span></div><div><div class="card-title">Прогноз накопления</div><div class="goal-forecast">${forecast.map(x=>`<div><i style="height:${Math.max(8,x.saved/g.target*100)}%"></i><strong>${money(x.saved)}</strong><span>${monthLabel(x.date)}</span></div>`).join('')}</div></div><div class="button function renameDictionary(kind,oldName,newName){if(kind==='categories'){state.operations.forEach(x=>{if(x.category===oldName)x.category=newName});state.plans.forEach(x=>{if(x.category===oldName)x.category=newName});state.obligations.forEach(x=>{if(x.category===oldName)x.category=newName;if(x.title===oldName)x.title=newName});state.goals.forEach(x=>{if(x.name===oldName)x.name=newName});const c=state.categories.find(x=>x.name===oldName);if(c)c.name=newName;state.dictionaries.categories=state.categories.map(x=>x.name)}else if(kind==='operationTypes'){state.operations.forEach(x=>{if(x.type===oldName)x.type=newName});state.plans.forEach(x=>{if(x.type===oldName)x.type=newName});const i=state.dictionaries.operationTypes.indexOf(oldName);if(i>=0)state.dictionaries.operationTypes[i]=newName}else if(kind==='accounts'){state.operations.forEach(x=>{if(x.account===oldName)x.account=newName});const i=state.dictionaries.accounts.indexOf(oldName);if(i>=0)state.dictionaries.accounts[i]=newName}else if(kind==='groups'){state.operations.forEach(x=>{if(x.group===oldName)x.group=newName});state.categories.forEach(x=>{if(x.group===oldName)x.group=newName});const i=state.dictionaries.groups.indexOf(oldName);if(i>=0)state.dictionaries.groups[i]=newName}}
function transferReferences(kind,oldName,newName){if(kind==='categories'){state.operations.forEach(x=>{if(x.category===oldName)x.category=newName});state.plans.forEach(x=>{if(x.category===oldName)x.category=newName});state.obligations.forEach(x=>{if(x.category===oldName)x.category=newName});state.goals.forEach(x=>{if(x.name===oldName)x.name=newName})}else if(kind==='operationTypes'){state.operations.forEach(x=>{if(x.type===oldName)x.type=newName});state.plans.forEach(x=>{if(x.type===oldName)x.type=newName})}else if(kind==='accounts'){state.operations.forEach(x=>{if(x.account===oldName)x.account=newName})}else if(kind==='groups'){state.operations.forEach(x=>{if(x.group===oldName)x.group=newName});state.categories.forEach(x=>{if(x.group===oldName)x.group=newName})}}
function openDictionaryModal(kind,oldName='',returnTo='settings'){const category=kind==='categories'?state.categories.find(x=>x.name===oldName):null,label={categories:'категорию',operationTypes:'тип операции',accounts:'счёт',groups:'группу'}[kind];openModal(oldName?'Изменить '+label:'Добавить '+label,`<form id="dictionaryForm" class="form-card"><div class="field full"><label>Название</label><input name="name" value="${escapeHtml(oldName)}" required></div>${kind==='categories'?`<div class="field"><label>Группа</label><select name="group">${optionList(state.dictionaries.groups,category?.group||state.dictionaries.groups[0])}</select></div><div class="field"><label>Тип контроля</label><select name="controlType">${optionList(['fixed','limit','plan','goal','none'],category?.controlType||'limit')}</select></div><div class="field"><label>Лимит / план</label><input name="amount" type="number" min="0" value="${category?.amount||0}"></div><div class="field full"><label>Комментарий</label><input name="comment" value="${escapeHtml(category?.comment||'')}"></div>`:''}<button class="button gold full">Сохранить</button></form>`,()=>{el('#dictionaryForm').onsubmit=e=>{e.preventDefault();const v=Object.fromEntries(new FormData(e.target).entries()),name=v.name.trim();if(!name)return;if(oldName&&oldName!==name)renameDictionary(kind,oldName,name);if(!oldName){if(kind==='categories'){state.categories.push({id:'c'+Date.now(),name,group:v.group,controlType:v.controlType,amount:+v.amount||0,comment:v.comment,color:'#7796b2',active:true});state.dictionaries.categories=state.categories.map(x=>x.name)}else if(!state.dictionaries[kind].includes(name))state.dictionaries[kind].push(name)}if(kind==='categories'){const c=state.categories.find(x=>x.name===name);Object.assign(c,{group:v.group,controlType:v.controlType,amount:+v.amount||0,comment:v.comment})}save();closeModal();if(returnTo==='analytics'){active='analytics';analyticsScreen()}else settingsScreen();toast('Справочник обновлён')}})}
function openDictionaryDelete(kind,value){const items=kind==='categories'?state.categories.map(x=>x.name):state.dictionaries[kind],choices=items.filter(x=>x!==value);if(!choices.length){toast('Нельзя удалить последний элемент');return}openModal('Удаление из справочника',`<form id="dictionaryDeleteForm" class="form-card"><p class="report">Куда перенести связанные операции и планы из «${escapeHtml(value)}»?</p><div class="field"><label>Перенести в</label><select name="replacement">${optionList(choices,choices[0])}</select></div><button class="button gold">Перенести и удалить</button></form>`,()=>{el('#dictionaryDeleteForm').onsubmit=e=>{e.preventDefault();const replacement=new FormData(e.target).get('replacement');transferReferences(kind,value,replacement);if(kind==='categories'){state.categories=state.categories.filter(x=>x.name!==value);state.dictionaries.categories=state.categories.map(x=>x.name)}else state.dictionaries[kind]=state.dictionaries[kind].filter(x=>x!==value);save();closeModal();settingsScreen();toast('Элемент удалён, данные перенесены')}})}
async function syncSheets(mode){const url=el('#sheetUrl').value.trim();if(!url){toast('Укажите URL синхронизации');return}state.settings.sheetUrl=url;save();try{if(mode==='push'){const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',state})});if(!res.ok)throw Error('HTTP '+res.status);await res.text()}else{const res=await fetch(url+(url.includes('?')?'&':'?')+'action=load');if(!res.ok)throw Error('HTTP '+res.status);const data=await res.json();if(mode==='pull'&&data.state)state=migrate(data.state)}state.settings.sheetUrl=url;state.settings.lastSync=new Date().toISOString();save();settingsScreen();toast(mode==='test'?'Подключение работает':'Синхронизация завершена')}catch(e){toast('Синхронизация недоступна: '+e.message)}}

function openGlobalSearch(){openModal('Глобальный поиск',`<div class="search-box"><input id="globalSearch" placeholder="Операции, планы и цели"></div><div id="globalResults" class="list" style="margin-top:15px"><div class="empty-compact">Начните вводить запрос</div></div>`,()=>{el('#globalSearch').oninput=e=>{const q=e.target.value.trim().toLowerCase(),items=[];if(q){state.operations.filter(o=>[o.category,o.subcategory,o.comment,o.group].join(' ').toLowerCase().includes(q)).slice(0,8).forEach(o=>items.push(searchResult('operation',o.id,'↔',o.subcategory||o.category,'Операция · '+niceDate(o.date),money(o.amount))));state.plans.filter(p=>[p.title,p.category,p.comment].join(' ').toLowerCase().includes(q)).slice(0,6).forEach(p=>items.push(searchResult('plan',p.id,'▣',p.title,'План · '+niceDate(p.date),money(p.amount))));state.goals.filter(g=>g.name.toLowerCase().includes(q)).forEach(g=>items.push(searchResult('goal',g.id,'◇',g.name,'Цель',money(g.saved))))}el('#globalResults').innerHTML=items.join('')||'<div class="empty-compact">Ничего не найдено</div>';document.querySelectorAll('[data-search-kind]').forEach(b=>b.onclick=()=>openSearchResult(b.dataset.searchKind,b.dataset.searchId))}})}
function searchResult(kind,id,icon,name,meta,amount){return `<button class="list-item search-result" data-search-kind="${kind}" data-search-id="${id}"><span class="list-icon">${icon}</span><span><strong>${escapeHtml(name)}</strong><small>${escapeHtml(meta)}</small></span><span class="amount">${amount}</span></button>`}
function openSearchResult(kind,id){closeModal();active=kind==='operation'?'entry':kind==='plan'?'plan':'goals';render();setTimeout(()=>{if(kind==='operation')openOperationModal(id);if(kind==='plan')openPlanModal(id);if(kind==='goal')openGoalModal(id)},0)}
function notificationItems(){const items=[];state.obligations.filter(x=>!isPaid(x)).forEach(x=>items.push({id:'obligation-'+x.id,text:`${x.title}: оплатить ${money(x.amount)} до ${x.dueDay} числа`,target:'plan'}));overages().forEach(x=>items.push({id:'limit-'+x.id,text:`${x.name}: факт и планы выше лимита`,target:'analytics'}));const need=Math.max(0,(state.creditCard.plannedPayment||state.creditCard.minPayment)-state.creditCard.paidThisMonth);if(need)items.push({id:'credit-payment',text:`Кредитка: доплатить ${money(need)}`,target:'plan'});const prefs=state.settings.notificationPrefs,now=Date.now();return items.filter(x=>!prefs.disabled.includes(x.id)&&(!prefs.snoozed[x.id]||new Date(prefs.snoozed[x.id]).getTime()<=now))}
function openNotifications(){const items=notificationItems();openModal('Уведомления',items.length?`<div class="action-list">${items.map(x=>`<div class="notification-row"><strong>${escapeHtml(x.text)}</strong><div class="icon-actions"><button data-notification-action="open" data-id="${x.id}" data-target="${x.target}">Открыть</button><button data-notification-action="later" data-id="${x.id}">Напомнить позже</button><button data-notification-action="disable" data-id="${x.id}">Больше не напоминать</button></div></div>`).join('')}</div>`:'<div class="empty-compact">Новых уведомлений нет</div>',()=>{document.querySelectorAll('[data-notification-action]').forEach(b=>b.onclick=()=>handleNotification(b.dataset.notificationAction,b.dataset.id,b.dataset.target))})}
function handleNotification(action,id,target){const prefs=state.settings.notificationPrefs;if(action==='open'){closeModal();active=target||'home';render();return}if(action==='later')prefs.snoozed[id]=new Date(Date.now()+86400000).toISOString();if(action==='disable'&&!prefs.disabled.includes(id))prefs.disabled.push(id);save();openNotifications();toast(action==='later'?'Напомним завтра':'Уведомление отключено')}
function openModal(titleText,content,onReady){el('#modalRoot').innerHTML=`<div class="modal-backdrop" role="dialog" aria-modal="true"><div class="modal"><div class="modal-head"><h2>${titleText}</h2><button class="modal-close" aria-label="Закрыть">×</button></div>${content}</div></div>`;document.body.classList.add('modal-open');el('.modal-close').onclick=closeModal;el('.modal-backdrop').onclick=e=>{if(e.target===el('.modal-backdrop'))closeModal()};if(onReady)onReady()}
function closeModal(){el('#modalRoot').innerHTML='';document.body.classList.remove('modal-open')}
function download(name,data,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function exportCsv(){const h=['date','type','category','subcategory','amount','account','plannedFlag','comment','group'],q=v=>'"'+String(v??'').replaceAll('"','""')+'"';download('kontur-operations.csv','\ufeff'+h.join(';')+'\n'+state.operations.map(o=>h.map(k=>q(o[k])).join(';')).join('\n'),'text/csv')}
function importJson(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=migrate(JSON.parse(r.result));save();render();toast('Данные импортированы')}catch{toast('Не удалось прочитать файл')}};r.readAsText(f)}
function toast(s){const t=el('#toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

el('#globalSearchButton').onclick=openGlobalSearch;
el('#notificationsButton').onclick=openNotifications;
render();

  </script>
</body>
